<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profile | Fake Currency Detection</title>
  <link rel="stylesheet" href="index.css" />
</head>
<body>

<script>
  // Frontend session check
  if (!localStorage.getItem("isLoggedIn")) {
    window.location.href = "login.html";
  }
</script>

<header class="navbar">
  <div class="brand">
    <img src="logo.png" alt="Logo">
    <span>Fake Currency Detection</span>
  </div>

  <nav>
    <a href="index.html">Home</a>
    <a href="safety.html">Safety & Awareness</a>
    <a href="history.html">History</a>
    <a href="report.html">Report</a>
    <a href="help.html">Help</a>
    <a href="profile.html" class="active profile">Profile</a>
    <button class="logout-btn" id="logoutBtn" type="button">Logout</button>
  </nav>
</header>

<section class="page-hero">
  <span class="hero-tag">Account</span>
  <h1 class="page-title">My Profile</h1>
  
</section>

<section class="content-wrap">

  <div class="profile-card">

    <!-- ACCOUNT DETAILS -->
    <div class="profile-section">
      <div class="profile-item">
        <div>
          <h4>Username</h4>
          <p id="pUsername"></p>
        </div>
      </div>

      <div class="profile-item">
        <div>
          <h4>Date Joined</h4>
          <p id="pJoined"></p>
        </div>
      </div>

      <div class="profile-item">
        <div>
          <h4>Last Login</h4>
          <p id="pLastLogin"></p>
        </div>
      </div>
    </div>

  </div>

</section>

<footer>
  © 2026 Fake Currency Detection System | Final Year Project
</footer>

<script>
  function formatDateTime(value) {
    return value ? new Date(value).toLocaleString() : "-";
  }

  function renderProfile(u) {
    document.getElementById("pUsername").textContent = u.username || "-";
    document.getElementById("pJoined").textContent = formatDateTime(u.date_joined);
    document.getElementById("pLastLogin").textContent = formatDateTime(u.last_login);
  }

  function tryRenderFromLocalCache() {
    const raw = localStorage.getItem("profileData");
    if (!raw) {
      return false;
    }
    try {
      const cached = JSON.parse(raw);
      renderProfile(cached);
      return true;
    } catch (e) {
      return false;
    }
  }

  // Logout
  document.getElementById("logoutBtn")?.addEventListener("click", async () => {

  await fetch("http://127.0.0.1:8000/api/logout/", {
    method: "GET",
    credentials: "include"
  });

  localStorage.removeItem("isLoggedIn");
  localStorage.removeItem("profileData");
  window.location.href = "login.html";

});

  async function loadProfile() {
    try {
      const res = await fetch("http://127.0.0.1:8000/api/me/", {
        method: "GET",
        credentials: "include"
      });

      if (!res.ok) {
        if (tryRenderFromLocalCache()) {
          return;
        }
        localStorage.removeItem("isLoggedIn");
        localStorage.removeItem("profileData");
        window.location.href = "login.html";
        return;
      }

      const u = await res.json();
      renderProfile(u);
      localStorage.setItem(
        "profileData",
        JSON.stringify({
          username: u.username || "-",
          date_joined: u.date_joined || null,
          last_login: u.last_login || null
        })
      );

    } catch (err) {
      if (!tryRenderFromLocalCache()) {
        alert("Backend not reachable. Start Django server.");
      }
    }
  }

  loadProfile();
</script>

</body>
</html>
